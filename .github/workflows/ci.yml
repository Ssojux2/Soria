name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: make build

  swift-tests:
    name: Run Swift unit tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run Swift tests
        run: make test-swift

  python-tests:
    name: Run Python worker tests
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: analysis-worker/requirements.txt

      - name: Install worker dependencies
        run: python -m pip install -r analysis-worker/requirements.txt

      - name: Run Python tests
        run: PYTHON=python make test-worker
