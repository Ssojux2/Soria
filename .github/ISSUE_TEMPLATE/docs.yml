name: Documentation issue
description: Report missing, confusing, or outdated documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: dropdown
    id: docs_area
    attributes:
      label: Documentation area
      options:
        - README
        - Build from source
        - Release installation
        - Privacy or security
        - Program workflows
        - Rekordbox or Serato workflow
        - Troubleshooting
        - Other
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
      description: Describe what is missing, unclear, or wrong.
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording or examples
      description: Optional, but helpful.
